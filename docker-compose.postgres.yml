version: '3.8'

services:
  postgres-mcp:
    image: postgres:14-alpine
    container_name: postgres-mcp-test
    environment:
      POSTGRES_USER: auto_tool_user
      POSTGRES_PASSWORD: auto_tool_pass
      POSTGRES_DB: auto_tool_disc
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5432:5432"
    volumes:
      - postgres_mcp_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auto_tool_user -d auto_tool_disc"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_mcp_data:
    name: postgres_mcp_data