version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: auto_tool_disc_postgres
    environment:
      POSTGRES_USER: auto_tool_user
      POSTGRES_PASSWORD: auto_tool_pass
      POSTGRES_DB: auto_tool_disc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./setup/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auto_tool_user -d auto_tool_disc"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: